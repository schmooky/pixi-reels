<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pixi-reels — Arc Lord (zvuk + spine)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at center, #1a0f2e 0%, #0a0518 100%);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffd166;
    }
    canvas { display: block; }
    #hud {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 24px; align-items: center;
      font-size: 14px; text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      pointer-events: none; z-index: 1000;
    }
    #hud .label { opacity: 0.65; margin-right: 4px; }
    #hud .value { font-weight: 700; font-size: 18px; }
    #multiplier { color: #ffe66d; }
    #win { color: #6dffc6; }
    #status { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 11px; opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="label">WIN</span><span id="win" class="value">0</span></div>
    <div><span class="label">×</span><span id="multiplier" class="value">1</span></div>
  </div>
  <div id="status">Click to unlock audio · then SPIN</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
