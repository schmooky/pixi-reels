<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#ffe6cc"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ffa436"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#f4cfa3" stroke-width="1" opacity="0.6"/>
    </pattern>
    <filter id="softShadow"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g transform="translate(80,120)">
    <g>
      <rect x="-12" y="-44" width="240" height="38" rx="19" fill="#f97316" opacity="0.14"/>
      <text x="108" y="-17" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#c2410c" letter-spacing="2.5">ARCHITECTURE · 1.0</text>
    </g>
    <text x="0" y="72" font-family="Inter,system-ui,sans-serif" font-size="100" font-weight="700" fill="#1c1410" letter-spacing="-3">How it works,</text>
    <text x="0" y="186" font-family="Inter,system-ui,sans-serif" font-size="100" font-weight="700" fill="url(#orange)" letter-spacing="-3">under the hood.</text>
    <text x="0" y="256" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="400" fill="#5a4a3c">Builder → ReelSet → Reels → Phases. one ticker, no</text>
    <text x="0" y="296" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="400" fill="#5a4a3c">circular deps, fully headlessly testable.</text>
    <text x="0" y="396" font-family="ui-monospace,monospace" font-size="18" fill="#8a6a4c">◆ pixi-reels.schmooky.dev/architecture/</text>
  </g>

  <!-- Right: flow diagram -->
  <g transform="translate(740,150)" filter="url(#softShadow)" font-family="ui-monospace,monospace" font-size="16" font-weight="700">
    <g>
      <rect x="0" y="0" width="380" height="56" rx="14" fill="#f97316"/>
      <text x="190" y="35" text-anchor="middle" fill="#1c1410">ReelSetBuilder</text>
    </g>
    <path d="M 190 60 L 190 86" stroke="#f97316" stroke-width="3" marker-end="url(#arr)"/>
    <g transform="translate(0,90)">
      <rect width="380" height="56" rx="14" fill="#ffa436"/>
      <text x="190" y="35" text-anchor="middle" fill="#1c1410">ReelSet (Container)</text>
    </g>
    <path d="M 190 150 L 190 176" stroke="#f97316" stroke-width="3" marker-end="url(#arr)"/>
    <g transform="translate(0,180)">
      <rect width="180" height="56" rx="14" fill="#ffc766"/>
      <text x="90" y="35" text-anchor="middle" fill="#1c1410">Reel × N</text>
      <rect x="200" y="0" width="180" height="56" rx="14" fill="#ffc766"/>
      <text x="290" y="35" text-anchor="middle" fill="#1c1410">SpinController</text>
    </g>
    <path d="M 90 240 L 90 266" stroke="#f97316" stroke-width="3" marker-end="url(#arr)"/>
    <path d="M 290 240 L 290 266" stroke="#f97316" stroke-width="3" marker-end="url(#arr)"/>
    <g transform="translate(0,270)">
      <rect width="180" height="56" rx="14" fill="#f97316"/>
      <text x="90" y="35" text-anchor="middle" fill="#1c1410">ReelSymbol</text>
      <rect x="200" y="0" width="180" height="56" rx="14" fill="#f97316"/>
      <text x="290" y="35" text-anchor="middle" fill="#1c1410">Phases</text>
    </g>
  </g>
</svg>
