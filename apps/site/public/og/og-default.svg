<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#ffe6cc"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ffa436"/>
    </linearGradient>
    <linearGradient id="reelGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1410"/>
      <stop offset="0.5" stop-color="#2a1d15"/>
      <stop offset="1" stop-color="#1c1410"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#f4cfa3" stroke-width="1" opacity="0.6"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left: title block -->
  <g transform="translate(80,120)">
    <g>
      <rect x="-12" y="-44" width="180" height="38" rx="19" fill="#f97316" opacity="0.14"/>
      <text x="78" y="-17" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#c2410c" letter-spacing="2.5">1.0 · MIT</text>
    </g>
    <text x="0" y="72" font-family="Inter,system-ui,sans-serif" font-size="100" font-weight="700" fill="#1c1410" letter-spacing="-3">Slot reels,</text>
    <text x="0" y="186" font-family="Inter,system-ui,sans-serif" font-size="100" font-weight="700" fill="url(#orange)" letter-spacing="-3">ready to spin.</text>
    <text x="0" y="256" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="400" fill="#5a4a3c">Open-source reel engine for PixiJS v8.</text>
    <text x="0" y="296" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="400" fill="#5a4a3c">Fluent builder. typed events. headless tests. ~70 recipes.</text>
    <g transform="translate(0,370)" font-family="ui-monospace,monospace" font-size="18" fill="#8a6a4c">
      <text>◆ pixi-reels.schmooky.dev</text>
      <text x="320">◆ github.com/schmooky/pixi-reels</text>
    </g>
  </g>

  <!-- Right: animated-feeling reel mockup -->
  <g transform="translate(780,140)" filter="url(#softShadow)">
    <rect x="0" y="0" width="340" height="350" rx="32" fill="url(#reelGlass)" stroke="url(#orange)" stroke-width="2.5"/>
    <!-- Marquee bar -->
    <rect x="20" y="20" width="300" height="36" rx="18" fill="#f97316" opacity="0.18"/>
    <text x="170" y="44" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#ffa436" letter-spacing="2.4">PIXI · REELS · 1.0</text>

    <!-- 3x3 reels with motion -->
    <g transform="translate(20,76)" font-family="ui-monospace,monospace" font-size="40" font-weight="800" text-anchor="middle">
      <!-- Reel 1 (still) -->
      <rect x="0"   y="0"   width="90" height="80" rx="10" fill="#f97316"/>
      <text x="45"  y="55" fill="#1c1410">7</text>
      <rect x="0"   y="90"  width="90" height="80" rx="10" fill="#ffa436"/>
      <text x="45"  y="145" fill="#1c1410">7</text>
      <rect x="0"   y="180" width="90" height="80" rx="10" fill="#ffc766"/>
      <text x="45"  y="235" fill="#1c1410">7</text>

      <!-- Reel 2 (spinning, blurred bands) -->
      <rect x="105" y="0"   width="90" height="80" rx="10" fill="#ffc766" opacity="0.4"/>
      <rect x="105" y="90"  width="90" height="80" rx="10" fill="#f97316" opacity="0.7"/>
      <text x="150" y="145" fill="#1c1410" opacity="0.9">7</text>
      <rect x="105" y="180" width="90" height="80" rx="10" fill="#ffa436" opacity="0.4"/>

      <!-- Reel 3 (just landed - all 7s, golden) -->
      <rect x="210" y="0"   width="90" height="80" rx="10" fill="#f97316"/>
      <text x="255" y="55" fill="#1c1410">7</text>
      <rect x="210" y="90"  width="90" height="80" rx="10" fill="#ffa436"/>
      <text x="255" y="145" fill="#1c1410">7</text>
      <rect x="210" y="180" width="90" height="80" rx="10" fill="#ffc766"/>
      <text x="255" y="235" fill="#1c1410">7</text>
    </g>
  </g>
</svg>
