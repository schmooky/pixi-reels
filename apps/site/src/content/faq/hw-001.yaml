id: hw-001
group: hw
question: How do I build a Hold & Win board where each cell spins on its own?
answer: A Hold & Win cell is its own 1×1 ReelSet — the engine's atomic spin unit
  is the reel, the mechanic's is the cell. `HoldAndWinBuilder` (in `pixi-reels`)
  builds the whole grid of independent cells plus the lock / respin
  choreography. Import it and drive it with `enter()` then `respin()` per round.
