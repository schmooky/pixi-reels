id: cascade-001
group: cascade
question: How do I remove the winning symbols and drop new ones in?
answer: "Build with `.tumble(...)`, then after fading the winners call
  `reelSet.refill({ winners, grid: nextGrid })` with the cleared cells and the
  new symbols. Survivors fall into the gaps and fresh symbols drop in from
  above."
