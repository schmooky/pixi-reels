id: result-012
group: result
question: How do I replay the exact same spin again for a bug report?
answer: Re-inject the same seeded `.rng(fn)` and the same `setResult` grid; the
  debug recorder (`startRecording()` / `getFrames()`) captures a spin frame by
  frame.
