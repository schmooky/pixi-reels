id: hw-012
group: hw
question: How do I switch from base game into the Hold & Win board cleanly?
answer: Hide the base ReelSet and show the `HoldAndWinBoard.container` — same
  screen, two display objects; `enter(triggerCoins)` carries the trigger into
  the feature, and `feature:end` is when you swap back.
