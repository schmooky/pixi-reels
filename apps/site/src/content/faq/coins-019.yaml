id: coins-019
group: coins
question: How do I show a coin counting up its own value before locking?
answer: Tween a `{ v }` counter from 0 to the value in your `cell:landed` /
  `coin:locked` handler, rewriting the label every frame, then pop the fitted
  final amount in.
