name: npm-publish

# Unified release + snapshot pipeline. npm trusted publishing only allows
# one workflow file per trusted-publisher entry, so we merge both flows
# into this file. Job-level `if:` picks the right path:
#
#   push to main                    → release job (changesets/action)
#   push to any other branch        → snapshot job (per-branch dist-tag)
#   schedule (nightly 03:00 UTC)    → snapshot job (nightly dist-tag)
#   workflow_dispatch               → snapshot job (manual)
#
# A single trusted publisher entry on https://www.npmjs.com/package/pixi-reels/access
# covers both:
#   org/user:   schmooky
#   repository: pixi-reels
#   workflow:   npm-publish.yml
#   environment: npm-publish
#
# Install a published snapshot with:
#   pnpm add pixi-reels@<branch-tag>
# where <branch-tag> is the sanitized branch name (e.g. release/1.0.0
# → release-1-0-0, feat/shiny → feat-shiny). Nightlies land under `nightly`.

on:
  push:
    branches-ignore:
      # Changesets opens these branches to land the Version Packages PR;
      # publishing from them would double-publish.
      - 'changeset-release/**'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to snapshot (defaults to the workflow ref)'
        required: false
        type: string
      tag:
        description: 'Override dist-tag (defaults to sanitized branch name)'
        required: false
        type: string

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pinned npm for OIDC trusted publishing. Node 22 ships npm 10.x; trusted
  # publishing needs >= 11.5.1. Pinned (not @latest) so the publish toolchain
  # is reproducible across the release and snapshot jobs. Bump deliberately.
  PUBLISH_NPM_VERSION: '11.16.0'

jobs:
  # ── Release: push to main only ─────────────────────────────────────────
  # Auto-publish flow driven by changesets.
  #
  # How it works:
  #   1. Contributor opens a PR. If the PR ships user-visible changes they
  #      run `pnpm changeset` locally and commit the resulting .changeset/*.md
  #      file. The file states which packages bump and how.
  #   2. PR is reviewed and merged into main.
  #   3. This job runs. If there are any pending changeset .md files,
  #      changesets/action opens (or updates) a PR titled "Version Packages"
  #      that applies the version bumps, regenerates each affected package's
  #      CHANGELOG.md, and removes the consumed .changeset files.
  #   4. When the "Version Packages" PR is merged into main, this job runs
  #      again. This time there are no pending changesets, so the action
  #      runs `pnpm release` (build-all-publishable + changeset publish),
  #      which publishes every newly-bumped package to npm.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      # changesets/action needs these to open the Version Packages PR.
      contents: write
      pull-requests: write
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # changesets needs full history to compute "what changed since
          # the last release tag".
          fetch-depth: 0

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url. setup-node would auto-write an
          # .npmrc with `_authToken=${NODE_AUTH_TOKEN}` AND export
          # NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX as a placeholder.
          # npm CLI then treats the placeholder as a real token, skips
          # OIDC trusted publishing, and 404s. With no registry-url, npm
          # uses its built-in default (registry.npmjs.org) and has no
          # token, so OIDC trusted publishing kicks in.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 22 LTS ships npm 10.x. Trusted publishing was added in npm
        # 11.5.1. Without this the changesets action reports "OIDC is available"
        # but the older npm CLI never performs the handshake and `changeset
        # publish` fails with ENEEDAUTH.
        run: |
          npm install -g "npm@${PUBLISH_NPM_VERSION}"
          npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint guards
        run: pnpm check:lint

      - name: Typecheck
        run: pnpm --filter pixi-reels typecheck

      - name: Test
        run: pnpm --filter pixi-reels test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # Opens or updates the "Version Packages" PR with pending bumps.
          version: pnpm version-packages
          # Runs when the Version Packages PR has already been merged. builds
          # all dist/ folders topologically and publishes the bumped packages
          # to npm.
          publish: pnpm release
          # Create a GitHub Release for every package version that ships.
          createGithubReleases: true
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth is handled by npm OIDC trusted publishing. The npm CLI
          # (11.5.1+) requests a short-lived publishing token from npmjs.com
          # using this workflow's GitHub OIDC id-token. No long-lived
          # NPM_TOKEN secret needed.
          NPM_CONFIG_PROVENANCE: 'true'

  # ── Snapshot: everything else ──────────────────────────────────────────
  # Publishes a Changesets "snapshot" release of every package that has a
  # pending .changeset/*.md file on the current branch. Snapshot versions
  # are stamped `<base>-<tag>-<timestamp>` and published to npm under a
  # per-branch dist-tag so reviewers can install the preview without
  # disturbing `latest` or the normal release flow.
  snapshot:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url. setup-node would auto-write an
          # .npmrc with `_authToken=${NODE_AUTH_TOKEN}` AND export
          # NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX as a placeholder.
          # npm CLI then treats the placeholder as a real token, skips
          # OIDC trusted publishing, and 404s. With no registry-url, npm
          # uses its built-in default (registry.npmjs.org) and has no
          # token, so OIDC trusted publishing kicks in.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 22 LTS ships with npm 10.x. Trusted publishing was added in
        # npm 11.5.1. Without this step npm bails with ENEEDAUTH because
        # the older CLI doesn't even attempt the OIDC handshake.
        run: |
          npm install -g "npm@${PUBLISH_NPM_VERSION}"
          npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint guards
        run: pnpm check:lint

      - name: Typecheck
        run: pnpm --filter pixi-reels typecheck

      - name: Test
        run: pnpm --filter pixi-reels test

      - name: Derive dist-tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            RAW="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            RAW="nightly"
          else
            RAW="${{ github.event.inputs.branch || github.ref_name }}"
          fi
          SAN=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/^-*//; s/-*$//')
          echo "tag=$SAN" >> "$GITHUB_OUTPUT"
          echo "Snapshot dist-tag: $SAN"

      - name: Publish snapshot
        run: pnpm snapshot
        env:
          SNAPSHOT_TAG: ${{ steps.tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth via npm OIDC trusted publishing. No NPM_TOKEN env needed.
          NPM_CONFIG_PROVENANCE: 'true'
