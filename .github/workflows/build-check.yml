name: Build Check

# Builds every publishable workspace package using the same script the release
# workflow runs. A green PR here is a strong signal that `pnpm release` on main
# will succeed too. Also builds the docs site so we catch MDX/Astro regressions.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all publishable packages
        run: pnpm build:all

      - name: Build docs site
        run: pnpm site:build

      - name: Bundle size report
        # Informational on PRs - prints the gzipped size of the library dist.
        # Once the baseline is populated (`pnpm size:update` on main), switch
        # to `pnpm size:check` to enforce the drift tolerance.
        run: pnpm size
