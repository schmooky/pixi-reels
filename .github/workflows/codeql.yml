name: CodeQL

# GitHub-native static analysis for JavaScript/TypeScript across the
# whole monorepo. Findings land under the "Security" tab of the repo and
# are attached as annotations on PRs that introduce a regression.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Mondays 07:00 UTC - same slot as dependabot, so "weekly review" is
    # one pass across deps + SAST.
    - cron: '0 7 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          category: '/language:${{ matrix.language }}'
