name: CodeQL

# GitHub-native static analysis for JavaScript/TypeScript across the
# whole monorepo. Findings land under the "Security" tab of the repo and
# are attached as annotations on PRs that introduce a regression.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Mondays 07:00 UTC - same slot as dependabot, so "weekly review" is
    # one pass across deps + SAST.
    - cron: '0 7 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          category: '/language:${{ matrix.language }}'
