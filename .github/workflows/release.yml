name: Release

# Auto-publish flow driven by changesets.
#
# How it works:
#   1. Contributor opens a PR. If the PR ships user-visible changes they
#      run `pnpm changeset` locally and commit the resulting .changeset/*.md
#      file. The file states which packages bump and how.
#   2. PR is reviewed and merged into main.
#   3. This workflow runs. If there are any pending changeset .md files,
#      changesets/action opens (or updates) a PR titled "Version Packages"
#      that applies the version bumps, regenerates each affected package's
#      CHANGELOG.md, and removes the consumed .changeset files.
#   4. When the "Version Packages" PR is merged into main, this workflow
#      runs again. This time there are no pending changesets, so the
#      action runs `pnpm release` (build-all-publishable + changeset
#      publish), which publishes every newly-bumped package to npm.

on:
  push:
    branches:
      - main
  # Manual trigger from Actions -> "Release" -> "Run workflow". Useful when
  # a push event was dropped or you want to force a changeset-action pass
  # without pushing a new commit.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Pinning to a GitHub Environment lets a single npm trusted-publisher
    # entry cover both release.yml and snapshot.yml (same environment, two
    # workflows). The environment also gives us a place to add manual
    # approval later if we want a human-in-the-loop before a publish.
    environment: npm-publish
    permissions:
      # changesets/action needs these to open the Version Packages PR.
      contents: write
      pull-requests: write
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # changesets needs full history to compute "what changed since
          # the last release tag".
          fetch-depth: 0

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint guards
        run: pnpm check:lint

      - name: Typecheck
        run: pnpm --filter pixi-reels typecheck

      - name: Test
        run: pnpm --filter pixi-reels test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # Opens or updates the "Version Packages" PR with pending bumps.
          version: pnpm version-packages
          # Runs when the Version Packages PR has already been merged - builds
          # all dist/ folders topologically and publishes the bumped packages
          # to npm.
          publish: pnpm release
          # Create a GitHub Release for every package version that ships.
          createGithubReleases: true
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth is handled by npm OIDC trusted publishing. The npm CLI
          # (11.5.1+) requests a short-lived publishing token from npmjs.com
          # using this workflow's GitHub OIDC id-token. No long-lived
          # NPM_TOKEN secret needed. Configure the trusted publisher at
          # https://www.npmjs.com/package/pixi-reels/access pointing at
          # this repo, this workflow filename, and the npm-publish
          # environment above.
          NPM_CONFIG_PROVENANCE: 'true'
