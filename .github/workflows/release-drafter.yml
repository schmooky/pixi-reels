name: Release Drafter

# Maintains a repo-level draft GitHub Release on every push to main,
# assembled from merged PR titles + labels via .github/release-drafter.yml.
# Also applies semantic labels to PRs so they get categorised when merged.
#
# Changesets still owns per-package versioning and per-package changelogs.
# Release Drafter fills in the "what changed at the repo level" gap,
# including changes to apps/site and examples/ that never get a changeset.

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: release-drafter
  cancel-in-progress: false

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
