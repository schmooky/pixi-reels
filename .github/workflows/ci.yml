name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # commitlint --from <base> --to <head> needs both SHAs reachable.
          fetch-depth: 0

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint guards
        run: pnpm check:lint

      - name: Commit message lint
        if: github.event_name == 'pull_request'
        # Advisory only: commitlint findings are surfaced in the log but
        # never block the PR. Bot commits and historical malformed
        # headers should not gate merge.
        continue-on-error: true
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Typecheck
        run: pnpm --filter pixi-reels typecheck

      - name: Test
        run: pnpm --filter pixi-reels test

      - name: Build library + examples
        # `pnpm build` (root script) builds pixi-reels and every example app.
        # Catches regressions where the lib's published surface stops resolving
        # in a downstream consumer. e.g. a peer dep dropping out of a bundler's
        # static analysis path. Examples don't ship; this is purely a gate.
        run: pnpm build

  changeset-gate:
    # Fails the PR when library source changed but no changeset file was added.
    # Escape hatches:
    #   - `skip-changeset` label (docs/CI-only PRs, reverts, dependabot dev-dep bumps).
    #   - `changeset-release/main` head ref (the auto-generated "Version Packages" PR
    #     from changesets/action only DELETES changesets to consume them, so it
    #     would otherwise be perpetually red).
    if: >-
      github.event_name == 'pull_request'
      && !contains(github.event.pull_request.labels.*.name, 'skip-changeset')
      && github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect library changes
        id: lib
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" -- \
              'packages/pixi-reels/src/**' \
              'packages/pixi-reels/package.json' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require a changeset
        if: steps.lib.outputs.changed == 'true'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          added=$(git diff --name-only --diff-filter=A "$base" "$head" -- '.changeset/*.md' \
            | grep -vE '(^|/)README\.md$' || true)
          if [ -z "$added" ]; then
            echo "::error::This PR modifies packages/pixi-reels but adds no .changeset/*.md file."
            echo "Run 'pnpm changeset' and commit the generated file, or apply the 'skip-changeset' label if this PR ships no user-visible library change."
            exit 1
          fi
          echo "Found changeset(s):"
          echo "$added"
