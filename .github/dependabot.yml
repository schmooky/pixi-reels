# Dependabot keeps npm + GitHub Actions dependencies fresh. For a workspace
# monorepo the npm ecosystem at the root covers every apps/*, packages/*,
# and examples/* subfolder - Dependabot walks pnpm workspaces automatically.

version: 2
updates:
  # All workspace npm dependencies (apps/*, packages/*, examples/*)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      # `include: scope` makes Dependabot append its own (deps)/(deps-dev)
      # scope, so the prefix must stay bare — otherwise you get chore(deps)(deps).
      prefix: chore
      include: scope
    # Collapse minor + patch bumps into a single PR per ecosystem so the
    # review queue stays short. Majors still come in as one PR each.
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      # Pinned intentionally - bump these deliberately. The package.json
      # ranges also enforce the pin: spine uses '~4.2.110' (locked to
      # 4.2.x patches; 4.3.x is a breaking API change), pixi.js and gsap
      # use '^' but the ignore here keeps the bot from opening PRs.
      - dependency-name: '@esotericsoftware/spine-pixi-v8'
      - dependency-name: 'pixi.js'
      - dependency-name: 'gsap'
      # Vite 8.0.10+ rolldown bindings break @tailwindcss/vite and astro 6.x.
      # Pinned to 8.0.9 via package.json ranges. Revisit when astro and
      # tailwind catch up.
      - dependency-name: 'vite'
        versions: ['>= 8.0.10']

  # GitHub Actions workflows under .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      # Same reasoning as the npm block — use a bare type so scope is
      # supplied exactly once, by Dependabot.
      prefix: ci
      include: scope
