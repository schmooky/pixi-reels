name: Feature request
description: Suggest a new mechanic, demo, recipe, or API.
title: 'feat: '
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check the open issues and the docs site for anything that already covers this idea. Concrete use cases beat generic "it would be nice if..." framings every time.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the real-world situation that motivated this request. Skip the solution for now — just the problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Your best idea for how a new API, mechanic, or demo should work. Sketches, pseudo-API, or screenshots of other tools that got it right are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you looked at and why you ruled them out.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the repo would this touch?
      options:
        - Library (packages/pixi-reels)
        - Spine integration
        - Cascade / tumble
        - Cheats / testing utilities
        - Docs site (new page, new recipe, new demo)
        - Example app (classic-spin, cascade-tumble, hold-and-win)
        - Build / CI / release tooling
        - Unsure / cross-cutting
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to related issues, or anything else that would help shape the design.
    validations:
      required: false
